<!DOCTYPE html>
<html lang="en-US">
    <head>
        <!-- General meta tags needed-->
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <!-- Needed for responsive design -->
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <!-- If you want custom browser colors on mobile -->
        <meta name="theme-color" content="#1843c1" />
        <meta name="apple-mobile-web-app-status-bar-style" content="#1843c1">
        <title>Frontend Mentor | Stats preview card component</title>

        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet"> 
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"> 
        <!-- CSS File -->
        <link rel="stylesheet" href="dist/style.css?cb=1643307036310">
        <!-- Favicon  -->
        <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    </head>
    <body>

        <main>

            <div class="header-image">
              <img src="./images/image-header-mobile.jpg" alt="image-header-mobile" id="mobile-img">
              <img src="./images/image-header-desktop.jpg" alt="image-header-desktop" id="desktop-img">
              <span id="tint"></span>
            </div>

            <div class="left">

              <div class="main-text">
                <h1>Get <span>insights</span> that help your business grow.</h1>
                <p>  Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.</p>
              </div>
  
              <div class="stats">
                <div class="sub-stats">
                  <h2>10k+</h2>
                  <p>companies</p>
                </div>
  
                <div class="sub-stats">
                  <h2>314</h2>
                  <p>templates</p>
                </div>
  
                <div class="sub-stats">
                  <h2>12M+</h2>
                  <p>queries</p>
                </div>
              </div>
  
            </div>
        </main>

        <!-- JavaScript File -->
        <script src="dist/script.js?cb=1643307036310"></script>
    </body>
</html>
