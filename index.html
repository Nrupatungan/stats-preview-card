<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="stylesheet" href="/app/scss/style.scss?cb=1643291451901">

  <title>Frontend Mentor | Stats preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
  .attribution { font-size: 11px;
       text-align: center;
}
  .attribution a { color: hsl(228, 45%, 44%);
}
  </style>
</head>
<body>
  <main>
    <img src="./images/image-header-mobile.jpg" alt="" id="mobile-img">
    <img src="./images/image-header-desktop.jpg" alt="" id="desktop-img">
    <div class="main-text">
      <h1>Get <span>insights</span> that help your business grow.</h1>
      <p>  Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.</p>
    </div>
    <div class="stats">
      <div>
        <h2>10k+</h2>
        <p>companies</p>
      </div>
      <div>
        <h2>314</h2>
        <p>templates</p>
      </div>
      <div>
        <h2>12M+</h2>
        <p>queries</p>
      </div>
    </div>
  </main>
  <footer>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">Your Name Here</a>.
    </div>
  </footer>
  <script src="./app/js/script.js?cb=1643291451901"></script>
</body>
</html>
